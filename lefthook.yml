commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  commands:
    biome:
      run: pnpm exec biome check --staged --no-errors-on-unmatched
    rustfmt:
      run: $HOME/.cargo/bin/cargo fmt -- --check
      glob: "*.rs"

pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm run check
    typecheck:
      run: pnpm run typecheck
    test:
      run: pnpm test
    clippy:
      run: $HOME/.cargo/bin/cargo clippy -- -W clippy::all
    cargo-test:
      run: $HOME/.cargo/bin/cargo test
    cargo-deny:
      run: PATH="$HOME/.cargo/bin:$PATH" $HOME/.cargo/bin/cargo-deny check
