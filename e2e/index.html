<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>rapid-fuzzy browser WASM test</title>
</head>
<body>
  <h1>rapid-fuzzy browser WASM test</h1>
  <pre id="output">Loading WASM module...</pre>
  <script type="module">
    const out = document.getElementById('output');

    try {
      // Vite 8 does not support the TC39 WebAssembly ESM integration proposal,
      // so we cannot import rapid-fuzzy-wasm-bindgen.js directly (it contains
      // `import * as wasm from './file.wasm'` which Vite rejects with
      // "ESM integration proposal for Wasm is not supported currently").
      //
      // Instead, import the background bindings (no .wasm imports) and
      // instantiate the WASM binary manually.
      //
      // We cannot use fetch('../rapid-fuzzy-wasm-bindgen_bg.wasm') because
      // fetch() resolves URLs relative to the page URL (http://localhost:4567/),
      // not the filesystem — so '../' stays at '/' and Vite never finds the file.
      // Instead, use import('...?url') which is intercepted by Vite's module
      // resolver (filesystem-aware) and returns the correct @fs/ URL.
      const [mod, { default: wasmUrl }] = await Promise.all([
        import('../rapid-fuzzy-wasm-bindgen_bg.js'),
        import('../rapid-fuzzy-wasm-bindgen_bg.wasm?url'),
      ]);

      const bytes = await fetch(wasmUrl).then(r => r.arrayBuffer());
      const { instance } = await WebAssembly.instantiate(bytes, {
        './rapid-fuzzy-wasm-bindgen_bg.js': mod,
      });
      mod.__wbg_set_wasm(instance.exports);

      const results = {};

      // Distance functions
      results.levenshtein = mod.levenshtein('kitten', 'sitting');
      results.levenshteinIdentical = mod.levenshtein('hello', 'hello');
      results.normalizedLevenshtein = mod.normalizedLevenshtein('hello', 'hello');
      results.damerauLevenshtein = mod.damerauLevenshtein('hello', 'ehllo');
      results.jaro = mod.jaro('hello', 'hello');
      results.jaroWinkler = mod.jaroWinkler('hello', 'hello');
      results.sorensenDice = mod.sorensenDice('hello', 'hello');

      // Batch functions — convert TypedArray to plain array for JSON serialization
      results.levenshteinBatch = Array.from(mod.levenshteinBatch([['hello', 'hello'], ['hello', 'world']]));
      results.jaroBatch = Array.from(mod.jaroBatch([['hello', 'hello'], ['abc', 'xyz']]));

      // Many functions — convert TypedArray to plain array for JSON serialization
      results.levenshteinMany = Array.from(mod.levenshteinMany('hello', ['hello', 'world', 'help']));
      results.jaroMany = Array.from(mod.jaroMany('hello', ['hello', 'world']));

      // Token-based functions
      results.tokenSortRatio = mod.tokenSortRatio('New York Mets', 'Mets New York');
      results.tokenSetRatio = mod.tokenSetRatio('Mariners vs Yankees', 'Yankees vs Mariners');
      results.partialRatio = mod.partialRatio('hello', 'hello world');
      results.weightedRatio = mod.weightedRatio('hello', 'hello');

      // Search
      results.search = mod.search('type', ['TypeScript', 'JavaScript', 'Python', 'TypeSpec']);
      results.searchEmpty = mod.search('', ['hello', 'world']);

      // Closest — wasm-bindgen maps Rust Option::None to undefined; coerce to null
      // for JSON serializability and consistent Playwright page.evaluate() behavior.
      results.closest = mod.closest('apple', ['application', 'banana', 'apple pie']) ?? null;
      results.closestEmpty = mod.closest('hello', []) ?? null;

      // FuzzyIndex
      const index = new mod.FuzzyIndex(['apple', 'banana', 'grape', 'orange']);
      results.indexSize = index.size;
      results.indexSearch = index.search('aple');
      results.indexClosest = index.closest('aple');
      index.add('mango');
      results.indexSizeAfterAdd = index.size;
      index.destroy();
      results.indexSizeAfterDestroy = index.size;

      // Export list check
      const expectedExports = [
        'closest', 'search', 'FuzzyIndex',
        'levenshtein', 'levenshteinBatch', 'levenshteinMany',
        'normalizedLevenshtein', 'normalizedLevenshteinBatch', 'normalizedLevenshteinMany',
        'damerauLevenshtein', 'damerauLevenshteinBatch', 'damerauLevenshteinMany',
        'jaro', 'jaroBatch', 'jaroMany',
        'jaroWinkler', 'jaroWinklerBatch', 'jaroWinklerMany',
        'sorensenDice', 'sorensenDiceBatch', 'sorensenDiceMany',
        'tokenSortRatio', 'tokenSortRatioBatch', 'tokenSortRatioMany',
        'tokenSetRatio', 'tokenSetRatioBatch', 'tokenSetRatioMany',
        'partialRatio', 'partialRatioBatch', 'partialRatioMany',
        'weightedRatio', 'weightedRatioBatch', 'weightedRatioMany',
      ];
      results.missingExports = expectedExports.filter(name => typeof mod[name] === 'undefined');
      results.allExportsPresent = results.missingExports.length === 0;

      window.__results = results;
      window.__ready = true;
      out.textContent = JSON.stringify(results, null, 2);
    } catch (err) {
      window.__error = err.message;
      out.textContent = `Error: ${err.message}\n${err.stack}`;
    }
  </script>
</body>
</html>
