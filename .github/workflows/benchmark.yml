name: Benchmark

on:
  push:
    branches: [develop]
    paths:
      - 'crates/**'
      - '__test__/**/*.bench.ts'
      - 'vitest.config.ts'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'crates/**'
      - '__test__/**/*.bench.ts'
      - 'vitest.config.ts'
      - '.github/workflows/benchmark.yml'

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  rust-benchmark:
    name: Rust Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: bench

      - name: Run Criterion benchmarks
        run: cargo bench -p rapid-fuzzy-bench 2>&1 | tee rust-bench-output.txt

      - name: Parse Criterion results
        run: |
          node -e "
          const fs = require('fs');
          const output = fs.readFileSync('rust-bench-output.txt', 'utf8');
          const results = new Map();

          function addResult(name, value, unit) {
            if (unit === 'µs') value *= 1000;
            else if (unit === 'ms') value *= 1e6;
            else if (unit === 's') value *= 1e9;
            if (!results.has(name)) {
              results.set(name, { name: 'rust/' + name, unit: 'ops/s', value: Math.round(1e9 / value) });
            }
          }

          // Pattern 1: name and time on same line
          const re1 = /^([\w][\w/]*)\s+time:\s+\[[\d.]+ [µnms]+\s+([\d.]+)\s+([µnms]+)\s+[\d.]+ [µnms]+\]/gm;
          let m;
          while ((m = re1.exec(output)) !== null) addResult(m[1].trim(), parseFloat(m[2]), m[3]);

          // Pattern 2: name on one line, time indented on next
          const re2 = /^([\w][\w/]+)\n\s+time:\s+\[[\d.]+ [µnms]+\s+([\d.]+)\s+([µnms]+)\s+[\d.]+ [µnms]+\]/gm;
          while ((m = re2.exec(output)) !== null) addResult(m[1].trim(), parseFloat(m[2]), m[3]);

          const arr = [...results.values()];
          fs.writeFileSync('rust-bench-results.json', JSON.stringify(arr, null, 2));
          console.log('Parsed ' + arr.length + ' Rust benchmarks');
          arr.forEach(r => console.log('  ' + r.name + ': ' + r.value.toLocaleString() + ' ' + r.unit));
          "

      - name: Upload Rust benchmark results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: rust-bench-results
          path: rust-bench-results.json

  js-benchmark:
    name: JS Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: bench
      - run: pnpm install --frozen-lockfile

      - name: Build native module
        run: pnpm run build

      - name: Run Vitest benchmarks
        run: pnpm run bench 2>&1 | tee js-bench-output.txt

      - name: Parse Vitest results
        run: |
          node -e "
          const fs = require('fs');
          const raw = fs.readFileSync('js-bench-output.txt', 'utf8');
          const text = raw.replace(/\x1b\[[0-9;]*m/g, '');
          const results = [];
          let currentSuite = '';

          for (const line of text.split('\n')) {
            // Suite header: '✓ __test__/file.bench.ts > Suite Name'
            const suiteMatch = line.match(/[✓·]\s+__test__\/\S+\s+>\s+(.+?)(?:\s+\d+ms)?$/);
            if (suiteMatch) {
              currentSuite = suiteMatch[1].trim();
              continue;
            }
            // Benchmark row: '· name  123,456.78  ...'
            const benchMatch = line.match(/^\s+·\s+(.+?)\s{2,}([\d,]+\.\d+)\s/);
            if (benchMatch && currentSuite) {
              const name = benchMatch[1].trim();
              const hz = parseFloat(benchMatch[2].replace(/,/g, ''));
              // Only track rapid-fuzzy results for regression detection
              if (name.toLowerCase().includes('rapid-fuzzy')) {
                results.push({
                  name: 'js/' + currentSuite + '/' + name,
                  unit: 'ops/s',
                  value: Math.round(hz),
                });
              }
            }
          }

          fs.writeFileSync('js-bench-results.json', JSON.stringify(results, null, 2));
          console.log('Parsed ' + results.length + ' JS benchmarks');
          results.forEach(r => console.log('  ' + r.name + ': ' + r.value.toLocaleString() + ' ' + r.unit));
          "

      - name: Upload JS benchmark results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: js-bench-results
          path: js-bench-results.json

  report:
    name: Report
    needs: [rust-benchmark, js-benchmark]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Rust results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rust-bench-results

      - name: Download JS results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-bench-results

      - name: Merge benchmark results
        run: |
          node -e "
          const fs = require('fs');
          const rust = JSON.parse(fs.readFileSync('rust-bench-results.json', 'utf8'));
          const js = JSON.parse(fs.readFileSync('js-bench-results.json', 'utf8'));
          const merged = [...rust, ...js];
          fs.writeFileSync('benchmark-results.json', JSON.stringify(merged, null, 2));
          console.log('Total benchmarks: ' + merged.length);
          "

      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initial benchmark data branch"
            git push origin gh-pages
            git checkout "$GITHUB_SHA"
          fi

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1
        with:
          tool: 'customBiggerIsBetter'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Push results to gh-pages on develop pushes
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
          # Comment on PRs with comparison
          comment-on-alert: true
          comment-always: ${{ github.event_name == 'pull_request' }}
          # Alert if >10% regression
          alert-threshold: '110%'
          fail-on-alert: false
          benchmark-data-dir-path: bench
