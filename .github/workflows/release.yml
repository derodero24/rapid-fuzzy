name: Release

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ──── On develop push: version packages and create release PR to main ────
  version:
    name: Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Version packages and create release PR
        if: steps.changesets.outputs.count != '0'
        run: |
          pnpm changeset version
          VERSION=$(node -p "require('./package.json').version")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): version packages for v${VERSION}"
          git push origin develop

          EXISTING=$(gh pr list --base main --head develop --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "chore(release): release v${VERSION}"
            echo "Updated existing release PR #${EXISTING}"
          else
            gh pr create --base main --head develop \
              --title "chore(release): release v${VERSION}" \
              --body "$(printf '## Release v%s\n\nMerging this PR will:\n1. Build native binaries for all 9 platforms\n2. Publish to npm with provenance\n\n### Changelog\n\n```\n%s\n```' "$VERSION" "$(head -30 CHANGELOG.md)")"
            echo "Created release PR for v${VERSION}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──── On main push: check if publish is needed ────
  check:
    name: Check Version
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Check if version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "rapid-fuzzy@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} not yet published, proceeding"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  # ──── Build native binaries for all platforms ────
  build:
    name: Build - ${{ matrix.settings.target }}
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:22-alpine
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:22-alpine
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        if: ${{ !matrix.settings.docker }}
      - uses: actions/setup-node@v6
        if: ${{ !matrix.settings.docker }}
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.settings.docker }}
        with:
          shared-key: release-${{ matrix.settings.target }}

      - run: pnpm install --frozen-lockfile
        if: ${{ !matrix.settings.docker }}

      - name: Build
        if: ${{ !matrix.settings.docker }}
        run: >-
          pnpm build
          --target ${{ matrix.settings.target }}
          ${{ matrix.settings.use-cross && '--use-napi-cross' || '' }}

      - name: Build in Docker
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: >-
            --user 0:0
            -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db
            -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache
            -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index
            -v ${{ github.workspace }}:/build
            -w /build
          run: |
            set -e
            npm install -g corepack@latest
            corepack enable
            corepack install
            rustup target add ${{ matrix.settings.target }}
            pnpm install --frozen-lockfile
            pnpm build --target ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            rapid-fuzzy.*.node
            rapid-fuzzy.*.wasm
            rapid-fuzzy.wasi*.cjs
            rapid-fuzzy.wasi*.js
            wasi-worker*.mjs
          if-no-files-found: error

  # ──── Publish to npm after all builds succeed ────
  publish:
    name: Publish
    needs: [check, build]
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts to platform packages
        run: pnpm napi artifacts --dir artifacts

      - name: List packages
        run: |
          echo "=== Platform packages ==="
          for dir in npm/*/; do
            echo "$dir"
            ls -la "$dir" 2>/dev/null
            echo ""
          done

      - name: Publish to npm
        run: |
          npm config set provenance true
          npm publish --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
