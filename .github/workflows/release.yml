name: Release

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ──── On develop push: manage version PR and create release PR ────
  version:
    name: Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    env:
      LEFTHOOK: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Create version PR or detect release
        id: changesets
        uses: changesets/action@ce079ea084e08a340947ed4d6ecedb2433c8f293 # v1
        with:
          version: pnpm changeset version
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update release PR
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Skip if already published
          if npm view "rapid-fuzzy@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping release PR"
            exit 0
          fi

          EXISTING=$(gh pr list --base main --head develop --json number --jq '.[0].number')
          BODY=$(printf '## Release v%s\n\nMerging this PR will:\n1. Build native binaries for all 9 platforms\n2. Publish to npm with provenance\n\n### Changelog\n\n```\n%s\n```' "$VERSION" "$(head -50 CHANGELOG.md)")

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "chore(release): release v${VERSION}" --body "$BODY"
            echo "Updated existing release PR #${EXISTING}"
          else
            gh pr create --base main --head develop \
              --title "chore(release): release v${VERSION}" \
              --body "$BODY"
            echo "Created release PR for v${VERSION}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──── On main push: check if publish is needed ────
  check:
    name: Check Version
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc

      - name: Check if version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "rapid-fuzzy@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} already published, skipping"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} not yet published, proceeding"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  # ──── Build native binaries for all platforms ────
  build:
    name: Build - ${{ matrix.settings.target }}
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-zig: true
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-${{ matrix.settings.target }}

      - run: pnpm install --frozen-lockfile

      - name: Install cargo-zigbuild
        if: ${{ matrix.settings.use-zig }}
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Build
        run: >-
          pnpm build
          --target ${{ matrix.settings.target }}
          ${{ matrix.settings.use-cross && '--use-napi-cross' || '' }}
          ${{ matrix.settings.use-zig && '--cross-compile' || '' }}

      - name: Optimize WASM with wasm-opt
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
          pnpm run optimize:wasm

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            rapid-fuzzy.*.node
            rapid-fuzzy.*.wasm
            rapid-fuzzy.wasi*.cjs
            rapid-fuzzy.wasi*.js
            wasi-worker*.mjs
          if-no-files-found: error

  # ──── Publish to npm after all builds succeed ────
  publish:
    name: Publish
    needs: [check, build]
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Copy WASM wrapper files to workspace root
        run: |
          WASM_DIR="artifacts/bindings-wasm32-wasip1-threads"
          if [ -d "$WASM_DIR" ]; then
            cp "$WASM_DIR"/*.cjs "$WASM_DIR"/*.js "$WASM_DIR"/*.mjs . 2>/dev/null || true
            echo "Copied WASM wrapper files from $WASM_DIR"
            ls -la rapid-fuzzy.wasi* wasi-worker* 2>/dev/null
          fi

      - name: Move artifacts to platform packages
        run: pnpm napi artifacts --output-dir artifacts

      - name: List packages
        run: |
          echo "=== Platform packages ==="
          for dir in npm/*/; do
            echo "$dir"
            ls -la "$dir" 2>/dev/null
            echo ""
          done

      - name: Publish to npm
        run: |
          npm config set provenance true
          npm publish --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
