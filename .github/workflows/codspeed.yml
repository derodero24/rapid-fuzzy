name: CodSpeed

on:
  push:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
  pull_request:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: codspeed

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@4bb73acd2ddc568523ecd3ef0d0e84736a9145bd
        with:
          tool: cargo-codspeed

      - name: Build benchmarks
        run: cargo codspeed build -p rapid-fuzzy-bench

      - name: Run benchmarks
        uses: CodSpeedHQ/action@1c8ae4843586d3ba879736b7f6b7b0c990757fab # v4
        with:
          mode: simulation
          run: cargo codspeed run -p rapid-fuzzy-bench
