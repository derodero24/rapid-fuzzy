name: CodSpeed

on:
  push:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
  pull_request:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: codspeed

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@f8b8d555f84da49ac7e1e22379742eb1b8ded407
        with:
          tool: cargo-codspeed

      - name: Build benchmarks
        run: cargo codspeed build -p rapid-fuzzy-bench

      - name: Run benchmarks
        uses: CodSpeedHQ/action@db35df748deb45fdef0960669f57d627c1956c30 # v4
        with:
          mode: simulation
          run: cargo codspeed run -p rapid-fuzzy-bench
