name: CodSpeed

on:
  push:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
  pull_request:
    branches: [develop]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/codspeed.yml"
  workflow_dispatch:

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: codspeed

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@f8b8d555f84da49ac7e1e22379742eb1b8ded407
        with:
          tool: cargo-codspeed

      - name: Build benchmarks
        run: cargo codspeed build -p rapid-fuzzy-bench

      - name: Run benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4
        with:
          mode: simulation
          run: cargo codspeed run -p rapid-fuzzy-bench
